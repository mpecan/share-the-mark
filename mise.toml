# mise task runner — `mise tasks` to list, `mise run <task>` to run.
# Node is pinned in .tool-versions (read automatically); pnpm via corepack
# (packageManager field); the CLI uses your system Rust toolchain (rustup).
#
# Local review flow (Firefox or Chrome):
#   1. mise run dev:firefox     # loads the extension into Firefox (hot-reload)
#   2. mise run cli:install      # put `share-the-mark` on PATH (or use `mise run serve`)
#   3. the agent runs: share-the-mark request <url>  → annotate → "Send to agent"

# ── Extension: load in a browser for local testing (WXT dev, hot-reload) ──
[tasks.dev]
description = "Load the extension in Chrome and watch (local testing)"
run = "pnpm dev"

[tasks."dev:firefox"]
description = "Load the extension in Firefox and watch (local testing)"
run = "pnpm dev:firefox"

# ── Extension: build & package ──
[tasks.build]
description = "Build the Chrome extension into .output/chrome-mv3"
run = "pnpm build"

[tasks."build:firefox"]
description = "Build the Firefox extension into .output/firefox-mv2"
run = "pnpm build:firefox"

[tasks.zip]
description = "Package the Chrome extension (store zip)"
run = "pnpm zip"

[tasks."zip:firefox"]
description = "Package the Firefox extension (store zip)"
run = "pnpm zip:firefox"

# ── Extension: quality gates ──
[tasks.typecheck]
description = "Type-check the extension (tsc --noEmit)"
run = "pnpm typecheck"

[tasks.lint]
description = "Lint the extension (eslint, zero warnings)"
run = "pnpm lint"

[tasks.format]
description = "Format the repo with Prettier"
run = "pnpm format"

[tasks.test]
description = "Run the extension unit/integration tests"
run = "pnpm test"

[tasks."test:coverage"]
description = "Run the extension tests with coverage thresholds"
run = "pnpm test:coverage"

[tasks.e2e]
description = "Run the Playwright end-to-end tests (Chromium)"
run = "pnpm e2e"

[tasks.size]
description = "Check the bundle size budget"
run = "pnpm size"

# ── CLI (share-the-mark): build, test, run ──
[tasks."cli:build"]
description = "Build the share-the-mark CLI (debug)"
dir = "cli"
run = "cargo build"

[tasks."cli:test"]
description = "Run the share-the-mark CLI tests"
dir = "cli"
run = "cargo test"

[tasks."cli:clippy"]
description = "Lint the share-the-mark CLI (clippy, deny warnings)"
dir = "cli"
run = "cargo clippy --all-targets -- -D warnings"

[tasks."cli:fmt"]
description = "Check share-the-mark CLI formatting"
dir = "cli"
run = "cargo fmt --check"

[tasks."cli:check"]
description = "All share-the-mark CLI gates: fmt + clippy + test"
depends = ["cli:fmt", "cli:clippy", "cli:test"]

[tasks."cli:install"]
description = "Install the share-the-mark binary to ~/.cargo/bin"
dir = "cli"
run = "cargo install --path ."

[tasks.serve]
description = "Run the share-the-mark ingest daemon in the foreground"
dir = "cli"
run = "cargo run --quiet -- serve"

[tasks.request]
description = "Open a page for annotation and wait for feedback (agent flow)"
dir = "cli"
run = "cargo run --quiet -- request {{arg(name='url')}}"

# ── Combined ──
[tasks.icon]
description = "Regenerate the extension icons from design/icon.svg"
run = "node scripts/render-icon.mjs"

[tasks.setup]
description = "Install dependencies and prepare WXT"
run = "pnpm install && pnpm prepare"

[tasks.check]
description = "Run every extension gate (typecheck, lint, test, builds, e2e, size)"
run = """
pnpm typecheck \
  && pnpm lint \
  && pnpm test:coverage \
  && pnpm build \
  && pnpm build:firefox \
  && pnpm e2e \
  && pnpm size
"""

[tasks."check:all"]
description = "Run all gates for the extension and the CLI"
depends = ["check", "cli:check"]
