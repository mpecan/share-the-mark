name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare WXT
        run: pnpm prepare

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (coverage)
        run: pnpm test:coverage

      - name: Build (Chrome)
        run: pnpm build

      # Guards the activeTab least-privilege posture on the *production* build (the
      # e2e step below rebuilds with broad host into a separate output dir).
      - name: Check permissions
        run: pnpm check:perms

      - name: Build (Firefox)
        run: pnpm build:firefox

      - name: Size budget
        run: pnpm size

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end (Chromium)
        run: pnpm e2e

      - name: Package (Chrome + Firefox)
        run: |
          pnpm zip
          pnpm zip:firefox

      - name: Upload extension artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: extension-zips
          path: .output/*.zip
          if-no-files-found: warn

  cli:
    name: cli (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # No working-directory: the CLI gates run via mise (`cli:ci`), whose `build:embed`
    # dependency builds the embed bundle (Node) from the repo root before cargo — so
    # the binary embeds the real frontend artifact. mise is the single build orchestrator.
    steps:
      - uses: actions/checkout@v7

      # Installs Node 22 from .tool-versions and makes `mise` available.
      - uses: jdx/mise-action@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: cargo-${{ matrix.os }}-${{ hashFiles('cli/Cargo.lock') }}

      - name: Install JS deps (for the embed bundle build)
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: CLI gates (fmt + clippy + test + release build, embed baked in)
        run: mise run cli:ci
