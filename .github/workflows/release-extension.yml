name: Release Extension

# When release-please publishes an `extension-v<ver>` Release, build the store
# packages and attach them, so every extension release carries the uploadable
# Chrome/Firefox zips (+ the Firefox sources zip). Store submission stays manual.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  zips:
    if: startsWith(github.event.release.tag_name, 'extension-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm check:perms
      - run: pnpm zip
      - run: pnpm zip:firefox

      - name: Upload zips to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" .output/*.zip --clobber
