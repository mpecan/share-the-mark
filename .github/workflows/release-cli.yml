name: Release CLI

# Publishes the `share-the-mark` CLI when release-please publishes a `cli-v<ver>`
# Release (or via manual dispatch). Fans out to prebuilt binaries, crates.io, and
# the Homebrew tap. The CLI versions independently of the extension — see
# release-please-config.json.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to (re)build, e.g. cli-v0.1.0'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}

jobs:
  binaries:
    if: startsWith(inputs.tag || github.event.release.tag_name, 'cli-v')
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: jdx/mise-action@v2

      # Build the embed bundle and vendor it into the crate so build.rs bakes it into
      # the binary (build.rs runs host-side, so the embed survives cross-compilation).
      - name: Build & vendor the embed bundle
        shell: bash
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          mise run build:embed
          mkdir -p cli/embed
          cp .output/embed/local.global.js cli/embed/local.global.js
          test -s cli/embed/local.global.js

      # Builds cli/ for the target (cross-compiling via `cross` where needed),
      # archives `share-the-mark-<target>.{tar.gz,zip}` with a `.sha256`, and uploads
      # them to the release for this tag.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: share-the-mark
          target: ${{ matrix.target }}
          manifest-path: cli/Cargo.toml
          archive: $bin-$target
          checksum: sha256
          ref: refs/tags/${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}

  crates:
    if: startsWith(inputs.tag || github.event.release.tag_name, 'cli-v')
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - uses: jdx/mise-action@v2

      # Vendor the built bundle into the crate so the *published* crate carries it
      # (Cargo.toml `include` packages it; it stays gitignored locally). `cargo
      # install` from crates.io then bakes it in via build.rs.
      - name: Build & vendor the embed bundle
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          mise run build:embed
          mkdir -p cli/embed
          cp .output/embed/local.global.js cli/embed/local.global.js
          test -s cli/embed/local.global.js

      - name: cargo publish (idempotent)
        working-directory: cli
        run: |
          LOCAL=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name=="share-the-mark") | .version')
          PUBLISHED=$(cargo search share-the-mark --limit 1 | sed -n 's/^share-the-mark = "\([^"]*\)".*/\1/p' || true)
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "::notice::share-the-mark@$LOCAL already published, skipping"
          else
            # --allow-dirty: the vendored embed/local.global.js is gitignored/untracked.
            cargo publish --allow-dirty
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  homebrew:
    if: startsWith(inputs.tag || github.event.release.tag_name, 'cli-v')
    name: Update Homebrew tap
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - name: Compute version
        id: version
        run: echo "version=${RELEASE_TAG#cli-v}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # upload-rust-binary-action names the checksum after the archive base name
          # (share-the-mark-<target>.sha256), not the full archive (…tar.gz.sha256).
          for T in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu; do
            gh release download "$RELEASE_TAG" --repo "${{ github.repository }}" \
              --pattern "share-the-mark-$T.sha256" --output "$T.sha256"
          done
          {
            echo "SHA_ARM_MAC=$(cut -d' ' -f1 < aarch64-apple-darwin.sha256)"
            echo "SHA_INTEL_MAC=$(cut -d' ' -f1 < x86_64-apple-darwin.sha256)"
            echo "SHA_LINUX=$(cut -d' ' -f1 < x86_64-unknown-linux-gnu.sha256)"
          } >> "$GITHUB_ENV"

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.REPOSITORY_BUTLER_APP_ID }}
          private-key: ${{ secrets.REPOSITORY_BUTLER_PEM }}
          repositories: homebrew-tools

      - name: Checkout tap
        uses: actions/checkout@v7
        with:
          repository: mpecan/homebrew-tools
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tools

      - name: Generate formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'PY'
          import os, textwrap
          v = os.environ["VERSION"]
          base = f"https://github.com/mpecan/share-the-mark/releases/download/cli-v{v}"
          formula = textwrap.dedent(f"""
            class ShareTheMark < Formula
              desc "Receive design-feedback change-briefs from the share-the-mark browser extension"
              homepage "https://github.com/mpecan/share-the-mark"
              version "{v}"
              license "MIT"

              on_macos do
                on_arm do
                  url "{base}/share-the-mark-aarch64-apple-darwin.tar.gz"
                  sha256 "{os.environ['SHA_ARM_MAC']}"
                end
                on_intel do
                  url "{base}/share-the-mark-x86_64-apple-darwin.tar.gz"
                  sha256 "{os.environ['SHA_INTEL_MAC']}"
                end
              end

              on_linux do
                on_intel do
                  url "{base}/share-the-mark-x86_64-unknown-linux-gnu.tar.gz"
                  sha256 "{os.environ['SHA_LINUX']}"
                end
              end

              def install
                bin.install "share-the-mark"
              end

              test do
                assert_match "share-the-mark", shell_output("#{{bin}}/share-the-mark --version")
              end
            end
          """).strip()
          os.makedirs("homebrew-tools/Formula", exist_ok=True)
          with open("homebrew-tools/Formula/share-the-mark.rb", "w") as f:
              f.write(formula + "\n")
          PY

      - name: Commit and push
        working-directory: homebrew-tools
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/share-the-mark.rb
          if git diff --staged --quiet; then
            echo "Formula unchanged, skipping commit"
            exit 0
          fi
          git commit -m "share-the-mark ${{ steps.version.outputs.version }}"
          git push
