# Git hooks — see SPEC §8.6. Fast gates locally; the full e2e suite is left to
# CI for speed.
pre-commit:
  parallel: false
  commands:
    eslint:
      glob: '*.{ts,tsx,js,cjs,mjs}'
      run: pnpm eslint {staged_files} --fix --max-warnings=0
      stage_fixed: true
    prettier:
      glob: '*.{ts,tsx,js,cjs,mjs,json,jsonc,css,html,md,yml,yaml}'
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
    typecheck:
      run: pnpm typecheck

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}

pre-push:
  commands:
    test:
      run: pnpm test
